<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONEIRO - 梦境占卜师</title>
    
    <!-- UI 资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@200;500;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #020408; 
            color: #f8fafc; 
            font-family: 'Noto Serif SC', serif; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .font-mystic { font-family: 'Zhi Mang Xing', cursive; }
        .paper-overlay { 
            position: fixed; 
            inset: 0; 
            opacity: 0.04; 
            pointer-events: none; 
            z-index: 100; 
            mix-blend-mode: overlay; 
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png'); 
        }
        #export-container { position: absolute; left: -9999px; top: 0; width: 750px; }
        
        /* 自定义滚动条 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 10px; }
        
        .stage-transition-exit { opacity: 0; transform: scale(0.98); transition: all 0.8s ease; }
        .stage-transition-active { opacity: 1; transform: scale(1); transition: all 0.8s ease; }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "html2canvas": "https://esm.sh/html2canvas@^1.4.1",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
<body>
    <div class="paper-overlay"></div>
    <div id="root"></div>
    <!-- 用于生成分享图的隐藏容器 -->
    <div id="export-container"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
